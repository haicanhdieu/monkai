# config.yaml — Monkai Crawler Configuration
# All pipeline modules read from this file via utils/config.py
# To add a new source: add a new entry to 'sources' — no code changes needed (NFR9)

output_dir: data
log_file: logs/crawl.log

sources:
  - name: thuvienhoasen
    seed_url: https://thuvienhoasen.org/p16a0/kinh-dien
    rate_limit_seconds: 1.5
    output_folder: thuvienhoasen
    file_type_hints:
      - html
    css_selectors:
      catalog_links: "a.list-item-title"      # selector for scripture page links on catalog
      file_links: "a.download-link"            # selector for file download links on scripture page
      title: "h1.entry-title"                  # selector for scripture title
      category: ".breadcrumb li:nth-child(2)"  # selector for tradition/category
      subcategory: ".breadcrumb li:last-child" # selector for subcategory

  - name: thuvienkinhphat
    seed_url: https://thuvienkinhphat.net/thu-vien.html
    rate_limit_seconds: 1.5
    output_folder: thuvienkinhphat
    file_type_hints:
      - html
    catalog_sub_selector: "a[href$='.html']:not([href^='..'])"  # chapter links inside TOC index pages
    css_selectors:
      catalog_links: "li strong a"            # scripture collection links on main catalog
      file_links: ""                          # chapter page itself is the file
      title: ""                              # handled in code via title-tag split
      category: ""                           # handled in code via breadcrumb
      subcategory: ""                        # intentionally empty for this source
      book_collection: ""                    # not used for this source
      book_title: ""                         # handled in code via breadcrumb
      chapter: ""                            # handled in code via title-tag split
      author_translator: ""                  # handled in code via translator map
      content: "body"                        # full body text as content
