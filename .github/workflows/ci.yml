name: Reader CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/reader/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'apps/reader/**'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/reader
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: apps/reader/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build EPUBs
        run: pnpm run build:epubs

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        # vercel build runs pnpm build internally (Vite → dist/) and packages output to .vercel/output/
        # VITE_BASE_PATH not needed — Vercel serves from root (/)
        # VITE_BOOK_DATA_URL not needed — proxied via Vercel rewrite from same origin
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Upload Vercel output artifact
        uses: actions/upload-artifact@v4
        with:
          name: reader-vercel-output
          path: apps/reader/.vercel/output/
          retention-days: 1

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium


  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Vercel output artifact
        uses: actions/download-artifact@v4
        with:
          name: reader-vercel-output
          path: apps/reader/.vercel/output/

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        working-directory: apps/reader
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to Vercel production
        working-directory: apps/reader
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
