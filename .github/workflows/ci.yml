name: Reader CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/reader/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'apps/reader/**'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/reader
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: apps/reader/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build EPUBs
        run: pnpm run build:epubs

      - name: Build
        run: pnpm build

      - name: Create Vercel output
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/. .vercel/output/static/
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              { "src": "/book-data/(.*)", "dest": "https://pub-f372aac7cb1749f3927f74f6375153b5.r2.dev/book-data/$1" },
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          EOF

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vercel-build-output
          path: apps/reader/.vercel/output
          retention-days: 1

  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: vercel-build-output
          path: .vercel/output

      - name: Install Vercel CLI
        run: npm install -g vercel@39

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
