services:
  caddy:
    image: caddy:2-alpine
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${BOOK_DATA_PATH}:/srv/book-data:ro
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:3
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: http caddy:80 --domain=${NGROK_DOMAIN}
    depends_on:
      - caddy
    restart: unless-stopped
