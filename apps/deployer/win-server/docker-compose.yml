services:
  caddy:
    image: caddy:2-alpine
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${BOOK_DATA_PATH}:/srv/book-data:ro
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://caddy:80
    depends_on:
      - caddy
    restart: always

  url-watcher:
    build: ./url-watcher
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - GIT_USER_NAME
      - GIT_USER_EMAIL
      - SSH_PRIVATE_KEY
      - GIT_REPO_URL
    depends_on:
      - cloudflared
    restart: always
